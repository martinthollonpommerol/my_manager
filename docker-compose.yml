services:

  # Base de données PostgreSQL — usage standalone (hors devcontainer)
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mailapp
      POSTGRES_PASSWORD: mailapp
      POSTGRES_DB: mailapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailapp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
